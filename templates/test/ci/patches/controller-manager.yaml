kind: KubeadmControlPlane
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
metadata:
  name: "${CLUSTER_NAME}-control-plane"
spec:
  kubeadmConfigSpec:
    preKubeadmCommands:
    - |
      # Install ca-certificates packages for Azure Linux
      tdnf install -y ca-certificates ca-certificates-legacy
      update-ca-trust
      
      # Create symlinks for common certificate paths
      ln -sf /etc/pki/tls/certs/ca-bundle.crt /etc/ssl/certs/ca-certificates.crt
      ln -sf /etc/pki/tls/certs/ca-bundle.crt /etc/ssl/certs/ca-bundle.crt

      # Ensure etcd disk is properly mounted and accessible
      echo "Checking etcd disk mount..."
      ls -la /var/lib/etcddisk/ || echo "etcd disk not mounted"
      df -h /var/lib/etcddisk || echo "etcd disk mount check failed"
      
      # Ensure the etcd directory exists and has proper permissions
      mkdir -p /var/lib/etcddisk/etcd
      chmod 0700 /var/lib/etcddisk/etcd
      
      # Install additional utilities that might be needed for etcd
      tdnf install -y util-linux e2fsprogs
    clusterConfiguration:
      controllerManager:
        extraArgs:
          v: "4"
