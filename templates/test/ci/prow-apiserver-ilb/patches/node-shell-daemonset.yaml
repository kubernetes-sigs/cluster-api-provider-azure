apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-debug
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: node-debug
  template:
    metadata:
      labels:
        app: node-debug
    spec:
      containers:
        - name: node-debug
          image: busybox:1.35
          securityContext:
            privileged: true # Elevated privileges for accessing host resources
          command:
            - sh
            - -c
            - "sleep infinity"
          volumeMounts:
            - mountPath: /host/etc/hosts
              name: etc-hosts
              readOnly: true # Read-only for safety
      volumes:
        - name: etc-hosts
          hostPath:
            path: /etc/hosts
            type: File
