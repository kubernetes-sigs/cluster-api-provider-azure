apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
- ../prow-ci-version
- ../../../flavors/machinepool/machine-pool-deployment.yaml 
patches:
- patch: |-
    - op: add
      path: /spec/kubeadmConfigSpec/clusterConfiguration/scheduler
      value:
        extraArgs: {}
  target:
    kind: KubeadmControlPlane
- path: ../patches/alpha-beta-feature-gates-kubeadmcontrolplane.yaml
  target:
    kind: KubeadmControlPlane
- path: ../prow-machine-pool-ci-version/patches/kubeadm-bootstrap-k8s-ci-binaries.yaml
  target:
    group: bootstrap.cluster.x-k8s.io
    kind: KubeadmConfig
    name: .*-mp-0
    namespace: default
    version: v1beta1
- path: ../prow-machine-pool-ci-version/patches/machine-pool-ci-version.yaml 
- path: ../patches/uami-mp-0.yaml
sortOptions:
  order: fifo
