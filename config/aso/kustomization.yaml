apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
namespace: capz-system
resources:
  - https://github.com/Azure/azure-service-operator/releases/download/v2.18.0/azureserviceoperator_v2.18.0.yaml
  - settings.yaml
patches:
  - path: patches/migrate_stored_versions.yaml
    target:
      group: apps
      kind: Deployment
      name: azureserviceoperator-controller-manager
      version: v1
  - patch: |- # default kustomization includes a namespace already
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: azureserviceoperator-system
  - patch: |-
      - op: test
        path: /spec/template/spec/containers/0/args/6
        value: --crd-pattern=
      - op: replace # CAPZ lets ASO install and manage its own CRDs; users can extend the set via ADDITIONAL_ASO_CRDS (';'-delimited). The ADDITIONAL_ASO_CRDS default duplicates a base pattern so that, when the variable is unset, the value still parses as a non-empty list of fully-matching patterns (ASO rejects empty/whitespace pattern entries).
        path: /spec/template/spec/containers/0/args/6
        value: --crd-pattern=containerservice.azure.com/FleetsMember;containerservice.azure.com/MaintenanceConfiguration;containerservice.azure.com/ManagedCluster;containerservice.azure.com/ManagedClustersAgentPool;kubernetesconfiguration.azure.com/Extension;network.azure.com/BastionHost;network.azure.com/NatGateway;network.azure.com/PrivateEndpoint;network.azure.com/VirtualNetwork;network.azure.com/VirtualNetworksSubnet;resources.azure.com/ResourceGroup;${ADDITIONAL_ASO_CRDS:=resources.azure.com/ResourceGroup}
    target:
      group: apps
      kind: Deployment
      name: azureserviceoperator-controller-manager
      version: v1
  - patch: |- # Grant the ASO controller's SA permission to delete the CRDs it
      # manages. The migrate-aso-crd-stored-versions init container deletes
      # CRDs that have stale entries in status.storedVersions which the new
      # bundle no longer lists in spec.versions; the new ASO controller then
      # re-creates them from its bundled definitions. Without this verb the
      # init container's CRD delete is denied. The upstream ASO
      # azureserviceoperator-crd-manager-role grants
      # [create get list patch update watch] on customresourcedefinitions
      # cluster-wide; we add delete as a separate rule scoped via resourceNames
      # to just the CAPZ-managed CRDs, so a compromised ASO pod can't delete
      # arbitrary CRDs in the cluster.
      - op: test
        path: /rules/0/resources/0
        value: customresourcedefinitions
      - op: add
        path: /rules/-
        value:
          apiGroups:
            - apiextensions.k8s.io
          resources:
            - customresourcedefinitions
          resourceNames:
            - fleetsmembers.containerservice.azure.com
            - maintenanceconfigurations.containerservice.azure.com
            - managedclusters.containerservice.azure.com
            - managedclustersagentpools.containerservice.azure.com
            - extensions.kubernetesconfiguration.azure.com
            - bastionhosts.network.azure.com
            - natgateways.network.azure.com
            - privateendpoints.network.azure.com
            - virtualnetworks.network.azure.com
            - virtualnetworkssubnets.network.azure.com
            - resourcegroups.resources.azure.com
          verbs:
            - delete
    target:
      group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: azureserviceoperator-crd-manager-role
      version: v1
replacements:
  - source:
      fieldPath: metadata.namespace
      group: cert-manager.io
      kind: Certificate
      name: azureserviceoperator-serving-cert
      version: v1
    targets:
      - fieldPaths:
          - metadata.annotations.cert-manager\.io/inject-ca-from
        options:
          delimiter: /
        select:
          annotationSelector: cert-manager.io/inject-ca-from
          version: v1
      - fieldPaths:
          - spec.dnsNames.0
          - spec.dnsNames.1
        options:
          delimiter: .
          index: 1
        select:
          group: cert-manager.io
          kind: Certificate
          name: azureserviceoperator-serving-cert
          version: v1
