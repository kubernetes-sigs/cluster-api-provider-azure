apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
namespace: capz-system
resources:
  # The ASO version here is managed by `make generate-aso-crds`
  - https://github.com/Azure/azure-service-operator/releases/download/v2.17.0/azureserviceoperator_v2.17.0.yaml
  - crds.yaml
  - settings.yaml
patches:
  - path: patches/visualizer_label_in_bastionhosts.yaml
  - path: patches/visualizer_label_in_extensions.yaml
  - path: patches/visualizer_label_in_fleetmembers.yaml
  - path: patches/visualizer_label_in_managedclusteragentpools.yaml
  - path: patches/visualizer_label_in_managed_clusters.yaml
  - path: patches/visualizer_label_in_natgateways.yaml
  - path: patches/visualizer_label_in_privateendpoints.yaml
  - path: patches/visualizer_label_in_resourcegroups.yaml
  - path: patches/visualizer_label_in_subnets.yaml
  - path: patches/visualizer_label_in_virtualnetworks.yaml
  - patch: |- # default kustomization includes a namespace already
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: azureserviceoperator-system
  - patch: |-
      - op: test
        path: /spec/template/spec/containers/0/args/6
        value: --crd-pattern=
      - op: replace # Users can specify additional ASO CRDs. CRDs should be appended with ';'
        path: /spec/template/spec/containers/0/args/6
        value: --crd-pattern=${ADDITIONAL_ASO_CRDS:= }
    target:
      group: apps
      kind: Deployment
      name: azureserviceoperator-controller-manager
      version: v1
  # TODO: remove in next release after upgrades from versions with v1api20230315preview have migrated.
  # The FleetsMember CRD moved from v1api20230315preview to v1api20250301 with no overlapping versions.
  # Without these stubs, CRD updates fail because the old storage version in status.storedVersions
  # is not present in spec.versions.
  - patch: |-
      - op: add
        path: /spec/versions/-
        value:
          name: v1api20230315preview
          served: false
          storage: false
          schema:
            openAPIV3Schema:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      - op: add
        path: /spec/versions/-
        value:
          name: v1api20230315previewstorage
          served: false
          storage: false
          schema:
            openAPIV3Schema:
              type: object
              x-kubernetes-preserve-unknown-fields: true
    target:
      group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: fleetsmembers.containerservice.azure.com
      version: v1
replacements:
  - source:
      fieldPath: metadata.namespace
      group: cert-manager.io
      kind: Certificate
      name: azureserviceoperator-serving-cert
      version: v1
    targets:
      - fieldPaths:
          - metadata.annotations.cert-manager\.io/inject-ca-from
        options:
          delimiter: /
        select:
          annotationSelector: cert-manager.io/inject-ca-from
          version: v1
      - fieldPaths:
          - spec.dnsNames.0
          - spec.dnsNames.1
        options:
          delimiter: .
          index: 1
        select:
          group: cert-manager.io
          kind: Certificate
          name: azureserviceoperator-serving-cert
          version: v1
